<svg width="660" height="84" viewBox="0 0 660 84" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accent" x1="82" y1="0" x2="578" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#512BD4"/>
      <stop offset="0.5" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="fill" x1="0" y1="0" x2="190" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#512BD4"/>
      <stop offset="0.55" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-90%" width="140%" height="280%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <line x1="82" y1="12" x2="578" y2="12" stroke="url(#accent)" stroke-width="1.6" opacity="0.42"/>
  <line x1="82" y1="72" x2="578" y2="72" stroke="url(#accent)" stroke-width="1.6" opacity="0.42"/>

  <text x="330" y="29" text-anchor="middle" fill="#512BD4" font-family="Consolas, Menlo, Monaco, monospace" font-size="12" font-weight="700" letter-spacing="4">.NET</text>
  <text x="330" y="49" text-anchor="middle" fill="#38BDF8" font-family="Consolas, Menlo, Monaco, monospace" font-size="18" font-weight="800" letter-spacing="6" filter="url(#softGlow)">
    LOADING
    <animate attributeName="opacity" values="0.72;1;0.72" dur="1.9s" repeatCount="indefinite"/>
  </text>

  <rect x="126" y="61" width="408" height="8" rx="4" fill="#E2E8F0"/>
  <rect x="126" y="61" width="132" height="8" rx="4" fill="url(#fill)" filter="url(#softGlow)">
    <animate attributeName="x" values="126;402;126" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="width" values="90;132;90" dur="2.4s" repeatCount="indefinite"/>
  </rect>

  <circle cx="108" cy="65" r="2.6" fill="#512BD4" opacity="0.75"/>
  <circle cx="552" cy="65" r="2.6" fill="#14B8A6" opacity="0.75"/>
</svg>
